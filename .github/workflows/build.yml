name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: Install npm dependencies
      run: npm install

    - name: Install Capacitor dependencies
      run: npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/camera @capacitor/geolocation @capacitor/filesystem

    - name: Initialize Capacitor
      run: npx cap init AttendPro com.attendance.app --web-dir=www

    # Android platform already exists in repo, just sync
    - name: Sync web assets to Android
      run: npx cap sync android

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Android APK
      run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      shell: bash

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: attendance-app-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk