<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AttendPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a24;
            color: #fff;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div id="webview-container">
        <webview id="webview" src="https://kesyaipl.com/attendance/login.php"></webview>
    </div>
    <script>
        document.getElementById('webview').addEventListener('did-navigate', function(e) {
            console.log('Navigated to: ' + e.url);
        });
        
        document.getElementById('webview').addEventListener('did-finish-load', function(e) {
            console.log('Finished loading');
            injectNavigationCheck();
        });
        
        function injectNavigationCheck() {
            try {
                var webview = document.getElementById('webview');
                webview.executeScript({code: `
                    (function() {
                        var lastUrl = window.location.href;
                        setInterval(function() {
                            if (window.location.href !== lastUrl) {
                                lastUrl = window.location.href;
                                console.log('URL changed to: ' + lastUrl);
                            }
                        }, 1000);
                    })();
                `});
            } catch(e) {
                console.log('Error: ' + e.message);
            }
        }
    </script>
</body>
</html>
