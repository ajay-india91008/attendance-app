<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; connect-src 'self' https:; frame-src https:;">
    <title>AttendPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a24;
            color: #fff;
            overflow: hidden;
        }
        #app-frame { 
            width: 100%; 
            height: 100%; 
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="app-frame" src="https://kesyaipl.com/attendance/login.php"></iframe>
    <script>
        const iframe = document.getElementById('app-frame');
        let lastUrl = iframe.src;
        let checkCount = 0;
        
        function checkUrl() {
            try {
                const currentUrl = iframe.contentWindow.location.href;
                
                if (currentUrl !== lastUrl && currentUrl !== 'about:blank') {
                    if (currentUrl.includes('index.php') || currentUrl.includes('dashboard')) {
                        window.location.href = currentUrl;
                    } else {
                        lastUrl = currentUrl;
                    }
                }
            } catch(e) {}
            
            checkCount++;
            if (checkCount < 100) {
                setTimeout(checkUrl, 500);
            }
        }
        
        setTimeout(checkUrl, 2000);
    </script>
</body>
</html>
